<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Russia — Carte</title>

  <!-- CesiumJS (3D globe) -->
  <script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/';</script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>

  <!-- Leaflet (2D flat map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="styles.css">

  <style>
    html, body { overflow: hidden; height: 100%; }
    main.page-content { overflow: visible; padding: 0; margin: 0; }

    /* ── Couche 3D — CesiumJS ────────────────────────────────────── */
    #globe-hero {
      position: fixed;
      inset: 0;
      background: #090c10;
      z-index: 0;
    }
    #cesiumContainer {
      position: absolute;
      inset: 0;
    }

    /* ── Couche 2D — Leaflet ─────────────────────────────────────── */
    #map2d {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #090c10;
      display: none;
    }
    /* Override Leaflet chrome */
    .leaflet-container { background: #090c10 !important; font-family: 'Inter', sans-serif; }
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution {
      background: rgba(9,12,16,0.55) !important;
      color: rgba(140,165,200,0.35) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: rgba(140,165,200,0.45) !important; }

    /* ── Fondus — par-dessus les deux couches ────────────────────── */
    #globe-fades {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    .gfade { position: absolute; pointer-events: none; }
    .gfade-top    { top:0;left:0;right:0;height:90px;
      background: linear-gradient(to bottom,#090c10,transparent); }
    .gfade-bottom { bottom:0;left:0;right:0;height:28%;
      background: linear-gradient(to bottom,transparent,#090c10); }
    .gfade-left   { top:0;left:0;bottom:0;width:8%;
      background: linear-gradient(to right,#090c10,transparent); }
    .gfade-right  { top:0;right:0;bottom:0;width:8%;
      background: linear-gradient(to left,#090c10,transparent); }

    /* ── Écran de chargement (Cesium uniquement) ─────────────────── */
    #globe-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #090c10; z-index: 20; gap: 14px;
      color: rgba(140,165,205,0.55); font-size: 13px;
      letter-spacing: 0.3px; transition: opacity 0.6s ease;
      font-family: 'Inter', sans-serif;
    }
    #globe-loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(100,130,170,0.15);
      border-top-color: rgba(100,150,210,0.55);
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Navbar au-dessus de tout ────────────────────────────────── */
    .navbar { z-index: 100; position: relative; }

    /* ── Boutons de vue — haut gauche ───────────────────────────── */
    #view-buttons {
      position: fixed; top: 60px; left: 28px;
      z-index: 50; display: flex; gap: 6px;
    }
    .view-btn {
      background: rgba(9,12,16,0.72);
      border: 1px solid rgba(100,130,170,0.22);
      border-radius: 6px; padding: 6px 14px;
      font-size: 12px; font-family: 'Inter', sans-serif;
      color: rgba(180,200,235,0.72); cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background .15s, color .15s, border-color .15s;
    }
    .view-btn:hover, .view-btn.active {
      background: rgba(45,60,82,0.90);
      color: rgba(220,232,255,0.95);
      border-color: rgba(100,140,200,0.38);
    }

    /* ── Bouton couche — haut droite ────────────────────────────── */
    #btn-layer {
      position: fixed; top: 60px; right: 28px; z-index: 50;
      background: rgba(10,28,24,0.78);
      border: 1px solid rgba(60,150,110,0.38);
      border-radius: 6px; padding: 6px 14px;
      font-size: 12px; font-family: 'Inter', sans-serif;
      color: rgba(130,210,175,0.85); cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background .15s, color .15s, border-color .15s;
    }
    #btn-layer:hover {
      background: rgba(20,55,45,0.92);
      border-color: rgba(60,180,130,0.55);
      color: rgba(170,235,205,0.98);
    }

    /* ── Légende contrôles — bas centré ─────────────────────────── */
    #globe-controls {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%); z-index: 50;
      background: rgba(9,12,16,0.58); backdrop-filter: blur(8px);
      border: 1px solid rgba(100,130,170,0.12);
      border-radius: 8px; padding: 8px 18px;
      font-size: 11px; color: rgba(140,165,205,0.48);
      font-family: 'Inter', sans-serif;
      white-space: nowrap; pointer-events: none;
    }
    #globe-controls span { color: rgba(180,200,235,0.68); font-weight: 500; }

    /* ── Affichage coordonnées — bas droite ─────────────────────── */
    #coords-display {
      position: fixed; bottom: 22px; right: 28px; z-index: 50;
      background: rgba(9,12,16,0.58); backdrop-filter: blur(8px);
      border: 1px solid rgba(100,130,170,0.12);
      border-radius: 8px; padding: 7px 10px 7px 14px;
      font-size: 11px; color: rgba(140,165,205,0.55);
      font-family: 'Inter', sans-serif; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
      font-variant-numeric: tabular-nums;
    }
    #coords-copy {
      background: none; border: none; padding: 2px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(140,165,205,0.28); cursor: not-allowed;
      transition: color .15s, opacity .15s;
      flex-shrink: 0;
    }
    #coords-copy.active {
      color: rgba(140,165,205,0.65); cursor: pointer;
    }
    #coords-copy.active:hover { color: rgba(180,210,255,0.95); }
    #coords-copy.copied { color: rgba(100,210,140,0.9); }

    /* ── Override Cesium chrome ──────────────────────────────────── */
    .cesium-widget canvas { border-radius: 0; }
    .cesium-viewer-toolbar { display: none !important; }
    .cesium-credit-container, .cesium-credit-logoContainer {
      opacity: 0.18 !important; filter: grayscale(1) !important; z-index: 50 !important;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html"        class="nav-link">Accueil</a></li>
      <li><a href="carte.html"        class="nav-link active">Carte</a></li>
      <li><a href="informations.html" class="nav-link">Informations sur la Russie</a></li>
      <li><a href="ia.html"           class="nav-link">Intelligence Artificielle</a></li>
      <li><a href="about.html"        class="nav-link">À propos de nous</a></li>
    </ul>
  </nav>

  <!-- Globe 3D (Cesium) -->
  <div id="globe-hero">
    <div id="cesiumContainer"></div>
    <div id="globe-loading">
      <div class="loader-ring"></div>
      Chargement du globe…
    </div>
  </div>

  <!-- Carte 2D (Leaflet) — cachée par défaut -->
  <div id="map2d"></div>

  <!-- Fondus — par-dessus les deux couches -->
  <div id="globe-fades">
    <div class="gfade gfade-top"></div>
    <div class="gfade gfade-bottom"></div>
    <div class="gfade gfade-left"></div>
    <div class="gfade gfade-right"></div>
  </div>

  <!-- Boutons de vue -->
  <div id="view-buttons">
    <button class="view-btn active" id="btn-3d">Globe 3D</button>
    <button class="view-btn"        id="btn-2d">Vue 2D</button>
  </div>

  <!-- Bouton couche (tout à droite) -->
  <button id="btn-layer">Carte OSM</button>

  <!-- Légende contrôles -->
  <div id="globe-controls">
    <span>Clic gauche</span> — Pivoter &nbsp;·&nbsp;
    <span>Molette</span> — Zoom &nbsp;·&nbsp;
    <span>Maj + clic</span> — Incliner &nbsp;·&nbsp;
    <span>Clic droit</span> — Poser une punaise
  </div>

  <!-- Coordonnées + bouton copie — bas droite -->
  <div id="coords-display">
    <span id="coords-text">— °&nbsp;&nbsp;— °</span>
    <button id="coords-copy" title="Copier les coordonnées">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </button>
  </div>

  <script src="nav.js"></script>
  <script>
  (function () {

    // ════════════════════════════════════════════════════════════════
    //  ÉTAT GLOBAL
    // ════════════════════════════════════════════════════════════════
    var currentLayer  = 'sat';   // 'sat' | 'osm'
    var activeView    = '3d';    // '3d' | '2d'
    var leafletMap    = null;
    var lSat = null, lOSM = null;

    // Punaise
    var pinnedCoords  = null;    // null | {lat, lng}
    var cesiumPin     = null;    // entity Cesium
    var leafletPin    = null;    // layer Leaflet

    // Refs DOM coords
    var coordsTextEl  = document.getElementById('coords-text');
    var coordsCopyEl  = document.getElementById('coords-copy');

    // ════════════════════════════════════════════════════════════════
    //  COORDONNÉES — utilitaires
    // ════════════════════════════════════════════════════════════════
    function formatCoords(lat, lng) {
      var latStr = Math.abs(lat).toFixed(5) + '°\u00a0' + (lat >= 0 ? 'N' : 'S');
      var lngStr = Math.abs(lng).toFixed(5) + '°\u00a0' + (lng >= 0 ? 'E' : 'W');
      return latStr + '   ' + lngStr;
    }

    function showCoords(lat, lng) {
      coordsTextEl.textContent = formatCoords(lat, lng);
    }

    function clearCoords() {
      if (!pinnedCoords) coordsTextEl.textContent = '— °\u00a0\u00a0— °';
    }

    function pinAt(lat, lng) {
      pinnedCoords = { lat: lat, lng: lng };
      showCoords(lat, lng);
      coordsCopyEl.classList.add('active');
    }

    function resetPin() {
      pinnedCoords = null;
      coordsCopyEl.classList.remove('active');
      clearCoords();
      if (cesiumPin)  { viewer.entities.remove(cesiumPin); cesiumPin = null; }
      if (leafletPin && leafletMap) { leafletMap.removeLayer(leafletPin); leafletPin = null; }
    }

    coordsCopyEl.addEventListener('click', function () {
      if (!pinnedCoords) return;
      var text = formatCoords(pinnedCoords.lat, pinnedCoords.lng);
      var btn = this;
      function flash() {
        btn.classList.add('copied');
        setTimeout(function () { btn.classList.remove('copied'); }, 1200);
      }
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(flash).catch(function () {
          fallbackCopy(text); flash();
        });
      } else {
        fallbackCopy(text); flash();
      }
    });

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    // ════════════════════════════════════════════════════════════════
    //  FOURNISSEURS DE TUILES
    // ════════════════════════════════════════════════════════════════
    var SAT_URL = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
    var OSM_URL = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';

    function makeCesiumSat() {
      return new Cesium.UrlTemplateImageryProvider({ url: SAT_URL, maximumLevel: 19, credit: '© Esri' });
    }
    function makeCesiumOSM() {
      return new Cesium.UrlTemplateImageryProvider({ url: OSM_URL, maximumLevel: 19, credit: '© OpenStreetMap' });
    }

    // ════════════════════════════════════════════════════════════════
    //  CESIUM — GLOBE 3D
    // ════════════════════════════════════════════════════════════════
    Cesium.Ion.defaultAccessToken = '';

    window._cesiumViewer = null;
    var viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer:            false,
      terrainProvider:      new Cesium.EllipsoidTerrainProvider(),
      baseLayerPicker:      false,
      geocoder:             false,
      homeButton:           false,
      sceneModePicker:      false,
      navigationHelpButton: false,
      animation:            false,
      timeline:             false,
      fullscreenButton:     false,
      infoBox:              false,
      selectionIndicator:   false,
      shadows:              false,
      shouldAnimate:        false
    });

    window._cesiumViewer = viewer;
    viewer.imageryLayers.addImageryProvider(makeCesiumSat());

    // Limite de dézoom : la Terre doit toujours rester visible (~40 000 km max)
    viewer.scene.screenSpaceCameraController.maximumZoomDistance = 4e7;

    viewer.scene.backgroundColor      = Cesium.Color.fromCssColorString('#090c10');
    viewer.scene.skyBox.show           = true;
    viewer.scene.sun.show              = true;
    viewer.scene.moon.show             = false;
    viewer.scene.skyAtmosphere.show    = true;
    viewer.scene.skyAtmosphere.saturationShift = -0.2;
    viewer.scene.skyAtmosphere.brightnessShift = -0.1;

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(95.0, 62.0, 8200000),
      orientation: { heading: 0.0, pitch: -Cesium.Math.PI_OVER_TWO, roll: 0.0 }
    });

    // Masquer le loading
    var loadingEl = document.getElementById('globe-loading');
    viewer.scene.globe.tileLoadProgressEvent.addEventListener(function (r) {
      if (r === 0) loadingEl.classList.add('hidden');
    });
    setTimeout(function () { loadingEl.classList.add('hidden'); }, 8000);

    // ── Coordonnées Cesium — survol ──────────────────────────────
    var rightDownPos = null;

    viewer.scene.canvas.addEventListener('mousemove', function (e) {
      if (pinnedCoords) return;
      var rect = viewer.scene.canvas.getBoundingClientRect();
      var pick = viewer.camera.pickEllipsoid(
        new Cesium.Cartesian2(e.clientX - rect.left, e.clientY - rect.top),
        viewer.scene.globe.ellipsoid
      );
      if (pick) {
        var c = Cesium.Cartographic.fromCartesian(pick);
        showCoords(Cesium.Math.toDegrees(c.latitude), Cesium.Math.toDegrees(c.longitude));
      } else {
        clearCoords();
      }
    });

    viewer.scene.canvas.addEventListener('mouseleave', function () { clearCoords(); });

    // ── Punaise Cesium — clic droit ──────────────────────────────
    viewer.scene.canvas.addEventListener('mousedown', function (e) {
      if (e.button === 2) rightDownPos = { x: e.clientX, y: e.clientY };
    });

    viewer.scene.canvas.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      if (!rightDownPos) return;
      var dx = e.clientX - rightDownPos.x;
      var dy = e.clientY - rightDownPos.y;
      rightDownPos = null;
      if (Math.sqrt(dx * dx + dy * dy) > 5) return; // c'était un drag (zoom)

      var rect = viewer.scene.canvas.getBoundingClientRect();
      var pick = viewer.camera.pickEllipsoid(
        new Cesium.Cartesian2(e.clientX - rect.left, e.clientY - rect.top),
        viewer.scene.globe.ellipsoid
      );
      if (!pick) return;

      var c   = Cesium.Cartographic.fromCartesian(pick);
      var lat = Cesium.Math.toDegrees(c.latitude);
      var lng = Cesium.Math.toDegrees(c.longitude);

      if (cesiumPin) viewer.entities.remove(cesiumPin);
      cesiumPin = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(lng, lat),
        point: {
          pixelSize: 10,
          color: Cesium.Color.fromCssColorString('#e03535'),
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          disableDepthTestDistance: Number.POSITIVE_INFINITY
        }
      });
      pinAt(lat, lng);
    });

    // ════════════════════════════════════════════════════════════════
    //  LEAFLET — CARTE 2D PLATE
    // ════════════════════════════════════════════════════════════════
    function initLeaflet() {
      if (leafletMap) return;

      leafletMap = L.map('map2d', {
        center: [62, 95],
        zoom: 3,
        zoomControl: false,
        attributionControl: true,
        minZoom: 2,
        maxZoom: 19,
        worldCopyJump: false,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0
      });

      lSat = L.tileLayer(SAT_URL, { maxZoom: 19, attribution: '© Esri, Maxar' });
      lOSM = L.tileLayer(OSM_URL, { maxZoom: 19, attribution: '© OpenStreetMap contributors' });

      if (currentLayer === 'sat') lSat.addTo(leafletMap);
      else                        lOSM.addTo(leafletMap);

      // Coordonnées Leaflet — survol
      leafletMap.on('mousemove', function (e) {
        if (pinnedCoords) return;
        showCoords(e.latlng.lat, e.latlng.lng);
      });
      leafletMap.on('mouseout', function () { clearCoords(); });

      // Punaise Leaflet — clic droit
      leafletMap.on('contextmenu', function (e) {
        if (leafletPin) leafletMap.removeLayer(leafletPin);
        leafletPin = L.circleMarker([e.latlng.lat, e.latlng.lng], {
          radius: 7,
          color: '#ffffff',
          fillColor: '#e03535',
          fillOpacity: 1,
          weight: 2.5
        }).addTo(leafletMap);
        pinAt(e.latlng.lat, e.latlng.lng);
      });
    }

    function show2D() {
      document.getElementById('globe-hero').style.display = 'none';
      document.getElementById('map2d').style.display = 'block';
      document.getElementById('globe-controls').style.display = 'none';
      resetPin();
      initLeaflet();
      setTimeout(function () { leafletMap.invalidateSize(); }, 50);
    }

    function show3D() {
      document.getElementById('map2d').style.display = 'none';
      document.getElementById('globe-hero').style.display = 'block';
      document.getElementById('globe-controls').style.display = '';
      resetPin();
    }

    // ════════════════════════════════════════════════════════════════
    //  BOUTONS DE VUE
    // ════════════════════════════════════════════════════════════════
    function setActive(id) {
      document.querySelectorAll('.view-btn').forEach(function (b) { b.classList.remove('active'); });
      document.getElementById(id).classList.add('active');
    }

    document.getElementById('btn-3d').addEventListener('click', function () {
      if (activeView === '2d') { show3D(); }
      activeView = '3d';
      setActive('btn-3d');
    });

    document.getElementById('btn-2d').addEventListener('click', function () {
      if (activeView !== '2d') {
        show2D();
        activeView = '2d';
      }
      setActive('btn-2d');
    });

    // ════════════════════════════════════════════════════════════════
    //  BOUTON COUCHE — synchronisé Cesium + Leaflet
    // ════════════════════════════════════════════════════════════════
    document.getElementById('btn-layer').addEventListener('click', function () {
      if (currentLayer === 'sat') {
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(makeCesiumOSM());
        if (leafletMap) { lSat.remove(); lOSM.addTo(leafletMap); }
        this.textContent = 'Satellite';
        currentLayer = 'osm';
      } else {
        viewer.imageryLayers.removeAll();
        viewer.imageryLayers.addImageryProvider(makeCesiumSat());
        if (leafletMap) { lOSM.remove(); lSat.addTo(leafletMap); }
        this.textContent = 'Carte OSM';
        currentLayer = 'sat';
      }
    });

  })();
  </script>
</body>
</html>
